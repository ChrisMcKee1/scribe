name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release context
        shell: pwsh
        run: |
          $props = [xml](Get-Content Directory.Build.props)
          $version = [string]$props.Project.PropertyGroup.VersionPrefix
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -ne "v$version") {
              throw "Tag $env:GITHUB_REF_NAME does not match source version v$version."
          }
          git fetch origin main --no-tags
          $head = git rev-parse HEAD
          $main = git rev-parse origin/main
          if ($head -ne $main) { throw "Release commit $head is not current origin/main $main." }
          "VERSION=$version" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download offline speech models
        shell: pwsh
        run: ./scripts/Download-Models.ps1

      - name: Run regression tests
        shell: pwsh
        run: dotnet test tests/Scribe.Core.Tests/Scribe.Core.Tests.csproj -c Release

      - name: Seed previous release for delta packaging
        shell: pwsh
        run: |
          $releases = gh release list `
              --repo "${{ github.repository }}" `
              --limit 20 `
              --json tagName,isDraft,isPrerelease | ConvertFrom-Json
          $previous = $releases |
              Where-Object {
                  -not $_.isDraft -and
                  -not $_.isPrerelease -and
                  $_.tagName -ne "v$env:VERSION"
              } |
              Select-Object -First 1
          if ($null -eq $previous) {
              Write-Host 'No previous stable release is available; a delta package is not expected.'
          }
          else {
              New-Item -ItemType Directory -Path releases -Force | Out-Null
              gh release download $previous.tagName `
                  --repo "${{ github.repository }}" `
                  --pattern 'Scribe-*-win-x64-full.nupkg' `
                  --dir releases
              if ($LASTEXITCODE -ne 0) {
                  throw "Could not download the previous full package from $($previous.tagName)."
              }
          }

      - name: Build release artifacts
        shell: pwsh
        run: ./build/pack.ps1

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $token = $env:GITHUB_TOKEN
          vpk upload github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --publish `
              --releaseName "Scribe $env:VERSION" `
              --tag "v$env:VERSION" `
              --targetCommitish "${{ github.sha }}" `
              --token $token `
              --outputDir releases `
              --channel win-x64

      - name: Upload release artifacts for manual run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scribe-${{ env.VERSION }}
          path: |
            releases/releases.win-x64.json
            releases/Scribe-${{ env.VERSION }}-win-x64-full.nupkg
            releases/Scribe-${{ env.VERSION }}-win-x64-delta.nupkg
            releases/Scribe-win-x64-Portable.zip
            releases/Scribe-win-x64-Setup.exe
          if-no-files-found: error
          retention-days: 7
